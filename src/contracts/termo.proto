syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.seuprojeto.termo.grpc";

service Termo {
    // Entra na fila. A resposta so chega quando o backend parear dois jogadores.
    rpc Conectar (JogadorRequest) returns (LobbyResponse);

    // Envia chute do jogador. Backend deve validar token antes de aceitar.
    rpc EnviarPalavra (TentativaRequest) returns (TentativaResponse);

    // Stream da partida. Jogador usa token; espectador usa assistir=true sem token.
    rpc MonitorarPartida (PartidaRequest) returns (stream EventoPartida);

    // Stream global para contador "pessoas online".
    rpc MonitorarOnline (OnlineRequest) returns (stream OnlineResponse);
}

message OnlineRequest {}

message OnlineResponse {
    int32 pessoas_online = 1;
}

message JogadorRequest {
    string nome = 1;
    // Id local da aba. Backend usa para impedir que F5 no lobby pareie usuario consigo mesmo.
    string client_session_id = 2;
}

message LobbyResponse {
    string id_jogador = 1;
    string id_partida = 2;
    string nome_oponente = 3;
    // Segredo do jogador. Front guarda em sessionStorage; nunca colocar na URL.
    string token_jogador = 4;
}

message TentativaRequest {
    string id_jogador = 1;
    string id_partida = 2;
    string palavra_chutada = 3;
    string token_jogador = 4;
}

message TentativaResponse {
    repeated int32 cores = 1;          // 0=cinza, 1=amarelo, 2=verde
    bool acertou = 2;
    int32 tentativas_restantes = 3;
    bool palavra_invalida = 4;
}

message PartidaRequest {
    string id_jogador = 1;
    string id_partida = 2;
    string token_jogador = 3;
    // true = visitante com URL assiste, mas nao controla a partida.
    bool assistir = 4;
}

enum TipoEvento {
    OPONENTE_JOGOU = 0;
    OPONENTE_VENCEU = 1;
    OPONENTE_ESGOTOU = 2;
    PARTIDA_ENCERRADA = 3;
    ESPECTADOR_JOGOU = 4;
}

message EventoPartida {
    TipoEvento tipo = 1;
    string mensagem = 2;
    repeated int32 cores_oponente = 3;
    int32 tentativa_numero = 4;
    bool empate = 5;
    string palavra_secreta = 6;
    bool voce_venceu = 7;
    string id_jogador = 8;
    string nome_jogador = 9;
}
