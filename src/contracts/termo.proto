syntax = "proto3";

option java_multiple_files = true;
option java_package = "br.com.ucsal.termo.grpc";

service Termo {
    rpc Conectar (JogadorRequest) returns (LobbyResponse);
    rpc EnviarPalavra (TentativaRequest) returns (TentativaResponse);
    rpc MonitorarPartida (PartidaRequest) returns (stream EventoPartida);
    rpc BuscarEstadoPartida (PartidaRequest) returns (EstadoPartidaResponse);
    rpc JogadoresDisponiveis (LobbyRequest) returns (stream LobbyStatusResponse);
    rpc AssistirPartida (AssistirPartidaRequest) returns (stream EstadoPartidaEspectadorResponse);
}

message JogadorRequest {
    string nome = 1;
}

message LobbyRequest {
    bool lobby_ativo = 1;
}

message LobbyResponse {
    string id_jogador1 = 1;
    string nome_jogador1 = 2;
    string id_partida = 3;
    string nome_oponente = 4;
    string id_oponente = 5;
}

message LobbyStatusResponse {
    int32 quantidade_jogadores = 1;
}

message TentativaRequest {
    string id_jogador1 = 1;
    string id_partida = 2;
    string palavra_chutada = 3;
}

message TentativaResponse {
    repeated int32 cores = 1;
    bool acertou = 2;
    int32 tentativas_restantes = 3;
    string palavra_secreta = 4;
}

message PartidaRequest {
    string id_jogador = 1;
    string id_partida = 2;
}

message EventoPartida {
    bool oponente_ganhou = 1;
    int32 oponente_chutou = 2;
    string mensagem = 3;
}

message EstadoPartidaResponse {
    repeated string historico_chutes = 1;
    repeated ResultadoCores historico_cores = 2;
    int32 tentativas_restantes = 3;
    bool finalizada = 4;
    string palavra_secreta = 5;
}

message ResultadoCores {
    repeated int32 cores = 1;
}

message EstadoPartidaEspectadorResponse {
    string id_partida = 1;
    repeated ResultadoCores historico_cores_jogador1 = 2;
    repeated ResultadoCores historico_cores_jogador2 = 3;
    int32 tentativas_restantes_jogador1 = 4;
    int32 tentativas_restantes_jogador2 = 5;
    bool finalizada = 6;
    string palavra_secreta = 7;
}

message AssistirPartidaRequest {
    string id_partida = 1;
}
